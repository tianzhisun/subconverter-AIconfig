; Local OpenClash template - SLIM
; GEOSITE primary + GeoIP Lite CN fallback
; Designed for self-hosted SubConverter-Extended security.profile=lan rule limit.

[custom]
; ======================
; Proxy groups
; ======================
exclude_remarks=(?i)(流量|套餐|到期|有效期|剩余|过期|官网|主页|网址|网站|公告|通知|更新|频道|群组|客服|售前|售后|防失联|备用地址|邮箱|工单|邀请|返利|重置|勿选|禁止|Traffic|Expire|Reset|订阅)

custom_proxy_group=🚀 手动选择`select`[]♻️ 自动选择`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🇼🇸 台湾节点`[]🇰🇷 韩国节点`[]🎯 全球直连`.*
custom_proxy_group=♻️ 自动选择`smart`.*`https://cp.cloudflare.com/generate_204`300,,50

custom_proxy_group=🤖 ChatGPT`select`[]🚀 手动选择`[]♻️ 自动选择`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`.*
custom_proxy_group=🤖 AI服务`select`[]🚀 手动选择`[]♻️ 自动选择`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`.*
custom_proxy_group=📹 YouTube`select`[]🚀 手动选择`[]♻️ 自动选择`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`.*
custom_proxy_group=🚀 GitHub`select`[]🚀 手动选择`[]♻️ 自动选择`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`[]🎯 全球直连`.*
custom_proxy_group=🌐 社交媒体`select`[]🚀 手动选择`[]♻️ 自动选择`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`.*
custom_proxy_group=🇬 谷歌服务`select`[]🚀 手动选择`[]♻️ 自动选择`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`.*
custom_proxy_group=🍎 苹果服务`select`[]🎯 全球直连`[]🚀 手动选择`[]♻️ 自动选择`.*
custom_proxy_group=Ⓜ️ 微软服务`select`[]🎯 全球直连`[]🚀 手动选择`[]♻️ 自动选择`.*
custom_proxy_group=🎥 国外媒体`select`[]🚀 手动选择`[]♻️ 自动选择`[]🇺🇸 美国节点`[]🇯🇵 日本节点`[]🇸🇬 新加坡节点`.*
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 手动选择`[]♻️ 自动选择`[]🎯 全球直连`.*
custom_proxy_group=🎯 全球直连`select`[]DIRECT

; Region groups
custom_proxy_group=🇭🇰 香港节点`url-test`(港|香港|HK|Hong Kong|HKG|🇭🇰)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇺🇸 美国节点`url-test`(美|美国|US|United States|USA|洛杉矶|圣何塞|西雅图|纽约|🇺🇸)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇯🇵 日本节点`url-test`(日|日本|JP|Japan|Tokyo|大阪|东京|🇯🇵)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇸🇬 新加坡节点`url-test`(新|新加坡|SG|Singapore|狮城|🇸🇬)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇼🇸 台湾节点`url-test`(台|台湾|TW|Taiwan|Taipei|🇹🇼|🇨🇳)`https://cp.cloudflare.com/generate_204`300,,50
custom_proxy_group=🇰🇷 韩国节点`url-test`(韩|韩国|KR|Korea|首尔|Seoul|🇰🇷)`https://cp.cloudflare.com/generate_204`300,,50

; ======================
; Rules - keep this section compact to avoid SubConverter-Extended LAN profile rule limit
; ======================
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]IP-CIDR,10.0.0.0/8,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,172.16.0.0/12,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,192.168.0.0/16,no-resolve
ruleset=🎯 全球直连,[]IP-CIDR,127.0.0.0/8,no-resolve

ruleset=🤖 ChatGPT,[]GEOSITE,openai
ruleset=🤖 AI服务,[]GEOSITE,category-ai-!cn
ruleset=📹 YouTube,[]GEOSITE,youtube
ruleset=🚀 GitHub,[]GEOSITE,github
ruleset=🌐 社交媒体,[]GEOSITE,telegram
ruleset=🌐 社交媒体,[]GEOSITE,category-social-media-!cn
ruleset=🇬 谷歌服务,[]GEOSITE,google
ruleset=🎥 国外媒体,[]GEOSITE,netflix
ruleset=🎥 国外媒体,[]GEOSITE,disney
ruleset=🎥 国外媒体,[]GEOSITE,tiktok
ruleset=🍎 苹果服务,[]GEOSITE,apple
ruleset=Ⓜ️ 微软服务,[]GEOSITE,microsoft

ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,CN,no-resolve
ruleset=🐟 漏网之鱼,[]DST-PORT,80
ruleset=🐟 漏网之鱼,[]DST-PORT,443
ruleset=DIRECT,[]MATCH

enable_rule_generator=true
overwrite_original_rules=true
